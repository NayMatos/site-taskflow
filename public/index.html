<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Gestor de Tarefas Colaborativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        .dark ::-webkit-scrollbar-track { background: #1e293b; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .task-card { transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out; }
        .task-card:hover { transform: translateY(-4px); }
        .modal-backdrop { transition: opacity 0.3s ease-in-out; }
        .dark .column-drag-over { background-color: #334155 !important; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 flex flex-col min-h-screen">

    <!-- Cabeçalho -->
    <header class="bg-slate-800 shadow-md sticky top-0 z-10">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <h1 class="text-2xl sm:text-3xl font-bold text-slate-100">
                <span class="text-indigo-600">Task</span>Flow
            </h1>
            <button id="add-task-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-transform transform hover:scale-105 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <span class="hidden sm:inline">Nova Tarefa</span>
            </button>
        </div>
    </header>

    <!-- Kanban de Tarefas -->
    <main class="container mx-auto p-4 sm:p-6 lg:p-8 flex-grow">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div id="todo-column" class="bg-slate-800/70 rounded-xl p-4">
                <h2 class="text-xl font-semibold mb-4 text-slate-300 text-center border-b-2 border-red-400 pb-2">A Fazer</h2>
                <div id="todo-tasks" class="task-list min-h-[200px] space-y-4"></div>
            </div>
            <div id="inprogress-column" class="bg-slate-800/70 rounded-xl p-4">
                <h2 class="text-xl font-semibold mb-4 text-slate-300 text-center border-b-2 border-yellow-400 pb-2">Em Andamento</h2>
                <div id="inprogress-tasks" class="task-list min-h-[200px] space-y-4"></div>
            </div>
            <div id="done-column" class="bg-slate-800/70 rounded-xl p-4">
                <h2 class="text-xl font-semibold mb-4 text-slate-300 text-center border-b-2 border-green-400 pb-2">Concluído</h2>
                <div id="done-tasks" class="task-list min-h-[200px] space-y-4"></div>
            </div>
        </div>
    </main>

    <footer class="py-8 border-t border-slate-800 text-center text-slate-500 text-sm">
        <p>&copy; <span id="current-year"></span> Nayara Matos. Todos os direitos reservados.</p>
    </footer>

    <script>
        // Script para manter o ano atualizado automaticamente
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>

    <!-- Modal -->
    <div id="task-modal" class="fixed inset-0 z-50 items-center justify-center hidden">
        <div id="modal-backdrop" class="absolute inset-0 bg-black bg-opacity-60"></div>
        <div class="relative bg-slate-800 rounded-lg shadow-xl w-11/12 max-w-lg mx-auto">
            <div class="p-6">
                <h3 id="modal-title" class="text-2xl font-bold text-slate-100 mb-6">Nova Tarefa</h3>
                <form id="task-form">
                    <input type="hidden" id="task-id">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300">Título</label>
                            <input type="text" id="title" class="mt-1 block w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-md text-white focus:ring-indigo-500 focus:border-indigo-500" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300">Descrição</label>
                            <textarea id="description" rows="3" class="mt-1 block w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-md text-white focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-300">Data</label>
                                <input type="date" id="dueDate" class="mt-1 block w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-md text-white [color-scheme:dark]">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-300">Prioridade</label>
                                <select id="priority" class="mt-1 block w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-md text-white">
                                    <option value="baixa">Baixa</option>
                                    <option value="media" selected>Média</option>
                                    <option value="alta">Alta</option>
                                </select>
                            </div>
                        </div>
                        <input type="hidden" id="status" value="todo">
                    </div>
                    <div class="mt-6 flex justify-end gap-3">
                        <button type="button" id="cancel-btn" class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold py-2 px-4 rounded-lg transition-colors">Cancelar</button>
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg transition-colors">Salvar Tarefa</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="fixed inset-0 z-50 items-center justify-center hidden">
        <div id="confirm-backdrop" class="absolute inset-0 bg-black bg-opacity-60"></div>
        <div class="relative bg-slate-800 rounded-lg p-6 max-w-sm mx-auto text-center shadow-2xl border border-slate-700">
            <h3 id="confirm-msg" class="mb-5 text-lg text-slate-300">Tem certeza?</h3>
            <button id="confirm-yes" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-5 rounded-lg mr-2">Sim</button>
            <button id="confirm-no" class="bg-slate-700 text-slate-300 py-2 px-5 rounded-lg">Não</button>
        </div>
    </div>

    <!-- Notificações -->
    <div id="toast" class="fixed bottom-5 right-5 bg-green-500 text-white py-2 px-5 rounded-lg shadow-lg opacity-0 transition-opacity duration-300 z-50 pointer-events-none"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyB8yi2yP9uGU2M7XyrobbXjVHuQcjMMjA4",
            authDomain: "site-taskflow.firebaseapp.com",
            projectId: "site-taskflow",
            storageBucket: "site-taskflow.firebasestorage.app",
            messagingSenderId: "455476849123",
            appId: "1:455476849123:web:232d21fb3513cf0d81d8d6"
        }; 

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'taskflow-production';
        const tasksRef = collection(db, `/artifacts/${appId}/public/data/tasks`);

        const modal = document.getElementById('task-modal');
        const taskForm = document.getElementById('task-form');
        const toast = document.getElementById('toast');

        // --- Funções Auxiliares ---
        const showToast = (msg, error = false) => {
            toast.textContent = msg;
            toast.className = `fixed bottom-5 right-5 text-white py-2 px-5 rounded-lg shadow-lg z-50 transition-opacity duration-300 ${error ? 'bg-red-500' : 'bg-green-500'}`;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 3000);
        };

        const openModal = (task = null) => {
            taskForm.reset();
            if (task) {
                document.getElementById('modal-title').textContent = 'Editar Tarefa';
                document.getElementById('task-id').value = task.id;
                document.getElementById('title').value = task.title;
                document.getElementById('description').value = task.description;
                document.getElementById('dueDate').value = task.dueDate;
                document.getElementById('priority').value = task.priority;
                document.getElementById('status').value = task.status;
            } else {
                document.getElementById('modal-title').textContent = 'Nova Tarefa';
                document.getElementById('task-id').value = '';
                document.getElementById('status').value = 'todo';
            }
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        };

        const closeModal = () => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };
        window.closeModal = closeModal;

        // --- Firebase ---
        signInAnonymously(auth).then(() => {
            onSnapshot(tasksRef, (snap) => {
                const tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderTasks(tasks);
            });
        });

        taskForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('task-id').value;
            const data = {
                title: document.getElementById('title').value.trim(),
                description: document.getElementById('description').value.trim(),
                dueDate: document.getElementById('dueDate').value,
                priority: document.getElementById('priority').value,
                status: document.getElementById('status').value,
                updatedAt: new Date().toISOString()
            };

            try {
                if (id) {
                    await updateDoc(doc(db, `/artifacts/${appId}/public/data/tasks`, id), data);
                    showToast('Tarefa atualizada!');
                } else {
                    await addDoc(tasksRef, { ...data, createdAt: new Date().toISOString() });
                    showToast('Tarefa criada com sucesso!');
                }
                closeModal(); // FECHA O MODAL APÓS SALVAR
            } catch (err) {
                showToast('Erro ao salvar.', true);
            }
        });

        // --- Renderização ---
        const renderTasks = (tasks) => {
            const cols = { todo: 'todo-tasks', inprogress: 'inprogress-tasks', done: 'done-tasks' };
            Object.values(cols).forEach(id => document.getElementById(id).innerHTML = '');
            
            tasks.forEach(task => {
                const p = task.priority === 'alta' ? 'border-red-500 bg-red-900/20' : task.priority === 'media' ? 'border-yellow-500 bg-yellow-900/20' : 'border-blue-500 bg-blue-900/20';
                const el = document.createElement('div');
                el.className = `task-card bg-slate-700 p-4 rounded-lg border-l-4 ${p} cursor-grab`;
                el.draggable = true;
                el.innerHTML = `
                    <div class="flex justify-between items-start">
                        <h4 class="font-bold text-slate-100">${task.title}</h4>
                        <div class="flex gap-2">
                            <button class="edit-btn text-slate-400 hover:text-indigo-400">✎</button>
                            <button class="del-btn text-slate-400 hover:text-red-400">✖</button>
                        </div>
                    </div>
                    <p class="text-sm text-slate-400 my-2">${task.description}</p>
                    <div class="text-xs text-slate-500">${task.dueDate || 'Sem data'}</div>
                `;
                el.querySelector('.edit-btn').onclick = () => openModal(task);
                el.querySelector('.del-btn').onclick = () => {
                    const confirmModal = document.getElementById('confirm-modal');
                    confirmModal.classList.replace('hidden', 'flex');
                    document.getElementById('confirm-yes').onclick = async () => {
                        await deleteDoc(doc(db, `/artifacts/${appId}/public/data/tasks`, task.id));
                        confirmModal.classList.replace('flex', 'hidden');
                        showToast('Tarefa excluída.');
                    };
                    document.getElementById('confirm-no').onclick = () => confirmModal.classList.replace('flex', 'hidden');
                };
                el.ondragstart = (e) => e.dataTransfer.setData('id', task.id);
                document.getElementById(cols[task.status]).appendChild(el);
            });
        };

        // --- Eventos Globais ---
        document.getElementById('add-task-btn').onclick = () => openModal();
        document.getElementById('cancel-btn').onclick = closeModal;
        document.getElementById('modal-backdrop').onclick = closeModal;

        document.querySelectorAll('.task-list').forEach(list => {
            const col = list.parentElement;
            col.ondragover = (e) => e.preventDefault();
            col.ondrop = async (e) => {
                const id = e.dataTransfer.getData('id');
                const status = col.id.replace('-column', '');
                await updateDoc(doc(db, `/artifacts/${appId}/public/data/tasks`, id), { status });
            };
        });

        document.getElementById('copyright-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
